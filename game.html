        // Proper function declaration
        function calculateSumOutput(die1, die2) {
            var sum = die1 + die2;
            if (sum == 7 || sum == 11) {
                console.log("You Win!");
            } else if (die1 == die2 && die1 % 2 == 0) {
                console.log("Doubles! You get to roll again.");
            } else if (sum == 2 || sum == 3 || sum == 12) {
                console.log("You Lose!");
            } else {
                console.log("No immediate result: sum = " + sum);
            }
            // return the sum for further use
            return sum;
        }

        // Example usage: roll two dice and output result
        (function playExample() {
            var die1 = Math.floor(Math.random() * 6) + 1;
            var die2 = Math.floor(Math.random() * 6) + 1;
            var output = calculateSumOutput(die1, die2);
            console.log('Rolled:', die1, die2, 'Sum:', output);
        })();
